  #     - 32412:32412/udp
  #     - 32413:32413/udp
  #     - 32414:32414/udp
  #     - 32469:32469     # DLNA (only if you use it)
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             capabilities: ["gpu"]
  #             device_ids: ["0"]
