  #     - /mnt/ssd/docker-volumes/arr/plex/config:/config
  #     # Plex transcode scratch (optional but recommended on SSD)
  #     - /mnt/ssd/docker-volumes/arr/plex/transcode:/transcode
  #     # Keep the same mounts you already use so paths match Radarr/Sonarr/Bazarr
  #     - /mnt/ssd/docker-volumes/arr/sonarr/tvseries:/data/tvshows
  #     - /mnt/ssd/docker-volumes/arr/radarr/movies:/data/movies
  #     - /mnt/ssd/docker-volumes/arr/readarr/books:/data/books
  #     - /mnt/ssd/docker-volumes/arr/lidarr/music:/data/music
  #   ports:
  #     - 32400:32400     # Plex Web
  #     # Optional (recommended) discovery/casting on LAN:
  #     - 1900:1900/udp
  #     - 5353:5353/udp
