services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    init: true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: "${OPENCLAW_TZ:-Asia/Kolkata}"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:?OPENCLAW_GATEWAY_TOKEN is required}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]
    volumes:
      - /mnt/ssd/docker-volumes/openclaw/config:/home/node/.openclaw
      - /mnt/ssd/docker-volumes/openclaw/workspace:/home/node/.openclaw/workspace
    networks:
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  proxy:
    external: true
