name: Validate AeroSpace Config

on:
  push:
    branches:
      - "**"
    paths:
      - "aerospace/aerospace.toml"
  pull_request:
    branches:
      - "**"
    paths:
      - "aerospace/aerospace.toml"
  workflow_dispatch:

jobs:
  validate-config:
    name: Validate aerospace.toml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate TOML syntax with Python
        run: |
          python3 - <<'PY'
          import pathlib
          import tomllib

          config_path = pathlib.Path("aerospace/aerospace.toml")
          with config_path.open("rb") as handle:
              tomllib.load(handle)

          print(f"Validated TOML syntax: {config_path}")
          PY
